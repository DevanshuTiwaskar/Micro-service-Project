apiVersion: apps/v1
kind: Deployment
metadata:
  name: music
spec:
  replicas: 1
  selector:
    matchLabels:
      app: music
  template:
    metadata:
      labels:
        app: music
    spec:
      containers:
        - name: music
          image: music-service
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: music-secrets
            
---
apiVersion: v1
kind: Service
metadata:
  name: music
spec:
  selector:
    app: music
  ports:
    - port: 4002
